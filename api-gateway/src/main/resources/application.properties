# ==========================================
# CẤU HÌNH CƠ BẢN (Gateway làm Lễ tân ở cổng 8080)
# ==========================================
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
server.port=8080
spring.application.name=api-gateway
eureka.client.serviceUrl.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=false

# ==========================================
# SPRING CLOUD GATEWAY ROUTES (Chỉ đường chuẩn)
# ==========================================

# 1. User service (Đẩy thẳng URL /users, /register sang cổng 8811)
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/users/**, /register/**

# 2. Product service
spring.cloud.gateway.routes[1].id=product-catalog-service
spring.cloud.gateway.routes[1].uri=lb://product-catalog-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/products/**

# 3. Recommendation service
spring.cloud.gateway.routes[2].id=product-recommendation-service
spring.cloud.gateway.routes[2].uri=lb://product-recommendation-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/*/recommendations/**, /recommendations/**

# 4. Order service
spring.cloud.gateway.routes[3].id=order-service
spring.cloud.gateway.routes[3].uri=lb://order-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/order/**


# 4. Payment-service
spring.cloud.gateway.routes[4].id=payment-service
spring.cloud.gateway.routes[4].uri=lb://payment-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/payments/**

# ==========================================
# SPRING SESSION & REDIS (Để làm chức năng Giỏ hàng)
# ==========================================
spring.session.store-type=redis
spring.session.redis.namespace=session
spring.session.redis.flush-mode=on-save
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Cấu hình CORS để Frontend (React/Vue) không bị lỗi khi gọi API
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
